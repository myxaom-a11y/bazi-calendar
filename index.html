<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ба-цзы Календарь Благоприятности</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #f8fafc 100%); 
            color: #0f172a; 
            min-height: 100vh;
        }
        
        /* Сетка календаря */
        .grid-calendar { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            gap: 0.35rem; 
        }
        
        @media (min-width: 768px) {
            .grid-calendar { gap: 0.5rem; }
        }

        /* Цветовые схемы для уровней удачи */
        .score-5 { background-color: #ecfdf5; color: #065f46; border: 1px solid #d1fae5; }
        .score-4 { background-color: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
        .score-3 { background-color: #f8fafc; color: #334155; border: 1px solid #f1f5f9; }
        .score-2 { background-color: #fff7ed; color: #9a3412; border: 1px solid #ffedd5; }
        .score-1 { background-color: #fff1f2; color: #9f1239; border: 1px solid #ffe4e6; }

        /* Эффекты при наведении */
        .score-5:hover { background-color: #d1fae5; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.1); }
        .score-4:hover { background-color: #fef08a; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(234, 179, 8, 0.1); }
        .score-3:hover { background-color: #f1f5f9; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(148, 163, 184, 0.1); }
        .score-2:hover { background-color: #ffedd5; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.1); }
        .score-1:hover { background-color: #ffe4e6; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.1); }

        /* Выделенный день */
        .active-day { 
            box-shadow: 0 0 0 3px #fff, 0 0 0 5px #3b82f6 !important;
            transform: scale(1.02) !important;
            z-index: 10;
            border-color: transparent !important;
        }

        /* Элегантный скроллбар */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        
        @media (max-width: 1023px) {
            .custom-scrollbar::-webkit-scrollbar { display: none; }
            .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }

        /* Декоративные восточные животные */
        .decor-animal {
            position: fixed; 
            z-index: 0; 
            opacity: 0.7; 
            pointer-events: none; 
        }

        .animal-bottom-left {
            bottom: -20px; left: -20px; width: 180px; height: auto; transform: rotate(15deg);
        }
        @media (min-width: 768px) { .animal-bottom-left { width: 280px; bottom: -30px; left: -30px; } }

        .animal-top-right {
            top: -20px; right: -20px; width: 180px; height: auto; transform: rotate(-135deg);
        }
        @media (min-width: 768px) { .animal-top-right { width: 280px; top: -30px; right: -30px; } }
    </style>
</head>
<body class="p-3 md:p-6 lg:p-8 flex items-start lg:items-center justify-center relative min-h-screen">

    <!-- === ДЕКОРАТИВНЫЕ ЖИВОТНЫЕ === -->
    <img src="https://placekitten.com/300/300" alt="Бык Декор" class="decor-animal animal-bottom-left" style="opacity: 0;">
    <img src="https://placekitten.com/301/301" alt="Тигр Декор" class="decor-animal animal-top-right" style="opacity: 0;">
    <!-- ============================== -->

    <div class="w-full max-w-7xl bg-white/90 backdrop-blur-3xl rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.08)] border border-white overflow-hidden flex flex-col lg:flex-row h-auto lg:h-[85vh] relative z-10">
        
        <!-- Левая панель: Календарь -->
        <div class="w-full lg:w-[60%] p-4 md:p-8 border-b lg:border-b-0 lg:border-r border-slate-100 overflow-y-auto custom-scrollbar flex flex-col bg-white/50">
            
            <div class="mb-5 md:mb-8 flex justify-between items-start sm:items-center flex-col sm:flex-row gap-4">
                <div>
                    <h1 id="month-title" class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Месяц</h1>
                    <p class="text-[13px] md:text-sm text-slate-500 mt-1 font-medium">Ваша карта: 丁丑 (Огонь Инь на Быке)</p>
                </div>
                <!-- Кнопки переключения месяцев -->
                <div class="flex gap-2">
                    <button id="btn-prev" class="w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-slate-100 hover:bg-slate-50 text-slate-600 transition disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <button id="btn-next" class="w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-slate-100 hover:bg-slate-50 text-slate-600 transition disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Легенда -->
            <div class="flex flex-wrap gap-x-4 gap-y-2 mb-6 text-[10px] md:text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-sm"></div> Отлично</div>
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-yellow-400 shadow-sm"></div> Хорошо</div>
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-slate-300 shadow-sm"></div> Нейтрально</div>
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-orange-400 shadow-sm"></div> Напряженно</div>
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-rose-400 shadow-sm"></div> Критично</div>
            </div>

            <!-- Дни недели -->
            <div class="grid-calendar text-center text-[10px] md:text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">
                <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div class="text-slate-300">Сб</div><div class="text-slate-300">Вс</div>
            </div>

            <!-- Сетка календаря -->
            <div id="calendar-grid" class="grid-calendar text-sm flex-grow pb-4">
                <!-- Генерируется через JS -->
            </div>
        </div>

        <div id="mobile-scroll-anchor"></div>

        <!-- Правая панель: Детали дня -->
        <div class="w-full lg:w-[40%] bg-slate-50/80 relative overflow-hidden flex flex-col">
            <div id="day-details" class="h-full overflow-y-auto custom-scrollbar p-6 md:p-8 lg:p-10">
                <!-- Контент деталей генерируется через JS -->
            </div>
        </div>

    </div>

    <script>
        // === БА-ЦЗЫ ДВИЖОК: Полный цикл 60 Цзя Цзы ===
        const jiazi = [
            "甲子", "乙丑", "丙寅", "丁卯", "戊辰", "己巳", "庚午", "辛未", "壬申", "癸酉",
            "甲戌", "乙亥", "丙子", "丁丑", "戊寅", "己卯", "庚辰", "辛巳", "壬午", "癸未",
            "甲申", "乙酉", "丙戌", "丁亥", "戊子", "己丑", "庚寅", "辛卯", "壬辰", "癸巳",
            "甲午", "乙未", "丙申", "丁酉", "戊戌", "己亥", "庚子", "辛丑", "壬寅", "癸卯",
            "甲辰", "乙巳", "丙午", "丁未", "戊申", "己酉", "庚戌", "辛亥", "壬子", "癸丑",
            "甲寅", "乙卯", "丙辰", "丁巳", "戊午", "己未", "庚申", "辛酉", "壬戌", "癸亥"
        ];

        const stemGods = { '甲':'Прямая Печать', '乙':'Косая Печать', '丙':'Грабитель Богатства', '丁':'Братство', '戊':'Вызов Власти', '己':'Дух Наслаждения', '庚':'Прямое Богатство', '辛':'Склонность к Богатству', '壬':'Правильная Власть', '癸':'Седьмой Убийца' };
        const branchGods = { '子':'Седьмой Убийца', '丑':'Дух Наслаждения', '寅':'Прямая Печать', '卯':'Косая Печать', '辰':'Вызов Власти', '巳':'Грабитель Богатства', '午':'Братство', '未':'Дух Наслаждения', '申':'Прямое Богатство', '酉':'Склонность к Богатству', '戌':'Вызов Власти', '亥':'Правильная Власть' };

        // Индивидуальная аналитика Земных Ветвей для карты Огонь Инь на Быке
        const branchAnalysis = {
            '子': { score: 4, gen: 'Крыса идеально сливается с вашим Быком (Дворец Брака). Ощущение внутреннего комфорта и крепкого тыла.', rec: 'Опирайтесь на поддержку партнеров и близких. Отличный день для того, чтобы разделить ответственность и вместе сделать рывок в делах.', risk: 'Скрытый "Вред" Крысы и Козы может дать легкое недопонимание с коллегами. Не обращайте внимания на мелкие сплетни.', rom: '🔥 <b>Идеально.</b> Знакомства сегодня дадут теплое чувство, будто вы давно знаете друг друга.', fin: '🤝 Отлично для совместных инвестиций и бизнес-партнерств. Ресурсы других людей помогут вам заработать.' },
            '丑': { score: 3, gen: 'Дубликат вашего собственного Столпа Личности. Внутренняя погруженность, огромная концентрация стихии Земли.', rec: 'Погрузитесь в самостоятельную, скрупулезную работу. Хорошо доводить до ума старые проекты, шлифовать детали и наводить порядок в алгоритмах.', risk: 'Избыток Земли вызывает физическую усталость и "залипание" на перфекционизме. Не пытайтесь сделать всё идеально.', rom: 'Спокойный день. Возможны приятные знакомства через общие рабочие или бытовые интересы.', fin: '🛠️ Деньги придут через рутину, детализацию и доведение старых дел до конца. Сегодня экономия важнее нового заработка.' },
            '寅': { score: 4, gen: 'Тигр (Дерево) активно подпитывает ваш Огонь. Энергия логики и знаний гармонично взаимодействует с вашими целями.', rec: 'Идеальный день для построения систем, настройки алгоритмов, работы с документами и стратегического планирования.', risk: 'Минимальны. Если опираться на разум и логику, день пройдет очень успешно.', rom: 'Нейтрально. Вы слишком логичны сегодня. Свидание может быть похоже на собеседование.', fin: '📈 Идеально для планирования, аналитики, инвестиций вдолгую и официальных финансовых бумаг.' },
            '卯': { score: 2, gen: 'Кролик вступает в прямое Столкновение с Петухом (вашим столпом Часа, отвечающим за проекты и результаты).', rec: 'Будьте готовы импровизировать. Если план ломается — отпускайте его и действуйте по обстоятельствам.', risk: 'Технические сбои, внезапные изменения в сроках сдачи проектов, недопонимание с исполнителями или подчиненными.', rom: 'Возможны технические накладки или срыв планов. Свидание может пойти совершенно не по вашему сценарию.', fin: '📉 Риск непредвиденных расходов или срыва договоренностей (удар по Часу). Отложите важные переводы.' },
            '辰': { score: 3, gen: 'Дракон сливается с Петухом, образуя сильный Металл (ваши Деньги). Однако массивная Земля истощает ваши силы.', rec: 'Продавливайте свои бизнес-идеи, опираясь на железобетонные аргументы. Зарабатывайте, но строго в рамках бизнес-часов.', risk: 'Физическое и нервное истощение. Амбиции Дракона могут заставить вас пообещать клиентам больше, чем вы реально можете.', rom: 'Вы склонны давить своим интеллектом. Постарайтесь быть мягче и больше слушать.', fin: '💰 Интеллект конвертируется в деньги. Смело продавливайте свои финансовые интересы аргументами.' },
            '巳': { score: 4, gen: 'Включается мощнейший Треугольник Металла (Змея-Петух-Бык). Карта буквально нацелена на извлечение прибыли.', rec: 'День максимальной финансовой удачи. Запускайте продажи, ищите новые источники дохода. Интуиция обострена.', risk: 'Работа на пределе возможностей, риск выгорания. Возможно чувство, что вашу работу недооценили морально.', rom: '💘 <b>Обречено на успех!</b> Активируется химия. Огненные взгляды, страсть и мгновенная искра.', fin: '💎 <b>Супер-прибыль!</b> Идеально для закрытия крупных сделок, получения бонусов и агрессивных продаж.' },
            '午': { score: 3, gen: 'Лошадь дает вам огромную силу (Огонь), но вступает в конфликт (Пробой) с вашим Быком (Дворец Брака).', rec: 'Направьте эту бурлящую энергию исключительно в работу. Вы можете свернуть горы и пробить любые стены.', risk: 'Категорически нельзя нести рабочее напряжение в дом. Высокий риск бытовых ссор из-за пустяков.', rom: '⚠️ <b>Осторожно.</b> Высокий риск недопонимания при первой встрече. Ваш избыток энергии может отпугнуть.', fin: '💡 Отличный день для интеллектуальных продуктов. Избегайте импульсивных трат и финансовых рисков.' },
            '未': { score: 1, gen: 'Прямое Столкновение Козы с вашим Быком. Сейсмическая нестабильность. Напряжение по оси "Карьера - Дом".', rec: 'Снизьте активность. Занимайтесь только текучкой. Делегируйте задачи. Если планы срываются — не спасайте их.', risk: 'Стресс, внезапные конфликты на ровном месте, поломки техники, хаос в расписании.', rom: '❌ <b>Критически плохо.</b> Сейсмический день. Отношения, начатые сегодня, принесут больше хлопот, чем радости.', fin: '❌ Финансовая турбулентность. Спрячьте кошелек, отмените коммерческие встречи. Никаких покупок.' },
            '申': { score: 3, gen: 'Обезьяна (Металл) ориентирует на заработок. Мощный фокус на результатах и прагматичности.', rec: 'Планомерная, спокойная работа. Смело привлекайте партнеров к своим коммерческим проектам.', risk: 'Придется поделиться прибылью или лаврами с теми, кто вам помог. Отнеситесь к этому философски.', rom: '💫 <b>Хорошо.</b> Сегодня вас могут удачно познакомить коллеги или друзья. Легкая интеллектуальная беседа.', fin: '🤝 Выгодные сделки через связи и нетворкинг. Умение делиться принесет дивиденды.' },
            '酉': { score: 4, gen: 'Дубликат вашей ветви Часа (Петух). Активируется встроенный механизм монетизации (Бык + Петух).', rec: 'Отличный день для мозговых штурмов с командой, поиска новых бизнес-моделей и оптимизации процессов.', risk: 'Риск потратить больше времени на обдумывание хитрых схем, чем на их реальное воплощение.', rom: '💘 <b>Обречено на успех!</b> Вы на одной волне с новыми знакомыми. Естественная химия и мощное притяжение.', fin: '💡 Быстрые коммерческие решения. Встроенный механизм генерации прибыли работает как швейцарские часы.' },
            '戌': { score: 1, gen: 'Формируется полное Земляное Наказание (Бык-Коза-Собака). Самая тяжелая, вязкая и неприятная конфигурация.', rec: 'Уйдите в тень. Сведите общение к минимуму. Займитесь рутинным программированием или расчетами.', risk: 'Острое чувство несправедливости, тяжесть в теле, скандалы, проблемы с пищеварением.', rom: '❌ <b>Плохо.</b> Земляное наказание дает фоновое ощущение холодности. Собеседница может вас откровенно бесить.', fin: '📉 Худший день для финансов. Возможны задержки оплат, штрафы и бюрократические преграды.' },
            '亥': { score: 5, gen: 'Свинья вступает в тайное слияние с Тигром из вашего Года рождения. Жесткая энергия обстоятельств превращается в полезный Ресурс.', rec: 'Идеальный день для решения бюрократических вопросов, стратегического планирования и нестандартных задач.', risk: 'Нет критических рисков. Любые ограничения обернутся вам на пользу.', rom: 'Нейтрально. Общение идет легко, но скорее в дружеском, доверительном ключе, без лишней драмы.', fin: '⚖️ Деньги придут через долгосрочное планирование и корпоративные стратегии.' }
        };

        // Настройки месяцев для генерации
        const monthsConfig = [
            { name: 'Май 2026', emptyDays: 4, daysCount: 31, startJiazi: 11 }, // Май 1: 乙亥
            { name: 'Июнь 2026', emptyDays: 0, daysCount: 30, startJiazi: 42 }, // Июнь 1: 丙午
            { name: 'Июль 2026', emptyDays: 2, daysCount: 31, startJiazi: 12 }  // Июль 1: 丙子
        ];

        let currentMonthIndex = 0;
        const grid = document.getElementById('calendar-grid');

        // Инициализация календаря
        function initCalendar() {
            document.getElementById('btn-prev').addEventListener('click', () => {
                if (currentMonthIndex > 0) { currentMonthIndex--; renderMonth(currentMonthIndex); }
            });
            document.getElementById('btn-next').addEventListener('click', () => {
                if (currentMonthIndex < monthsConfig.length - 1) { currentMonthIndex++; renderMonth(currentMonthIndex); }
            });
            renderMonth(0);
        }

        function renderMonth(index) {
            const config = monthsConfig[index];
            document.getElementById('month-title').innerText = config.name;
            
            // Управление кнопками
            document.getElementById('btn-prev').disabled = (index === 0);
            document.getElementById('btn-next').disabled = (index === monthsConfig.length - 1);
            
            grid.innerHTML = ''; // Очистка сетки

            // Добавление пустых ячеек (отступы до начала месяца)
            for (let i = 0; i < config.emptyDays; i++) {
                const empty = document.createElement('div');
                empty.className = 'p-2 rounded-2xl bg-transparent';
                grid.appendChild(empty);
            }

            // Генерация дней
            for (let i = 0; i < config.daysCount; i++) {
                const jiaziIndex = (config.startJiazi + i) % 60;
                const pair = jiazi[jiaziIndex];
                const stem = pair[0];
                const branch = pair[1];
                
                const bData = branchAnalysis[branch];
                const godsText = `${stemGods[stem]} / ${branchGods[branch]}`;

                const dataObj = {
                    date: i + 1,
                    stem: stem,
                    branch: branch,
                    score: bData.score,
                    gods: godsText,
                    general: bData.gen,
                    recommend: bData.rec,
                    risks: bData.risk,
                    romance: bData.rom,
                    finance: bData.fin
                };

                const cell = document.createElement('div');
                cell.className = `rounded-xl md:rounded-2xl cursor-pointer transition-all duration-300 ease-out score-${dataObj.score} flex flex-col p-1.5 md:p-2 h-[60px] sm:h-[70px] md:h-[85px] lg:h-[95px]`;
                
                cell.innerHTML = `
                    <div class="text-[10px] md:text-[13px] font-bold opacity-60 self-start leading-none mb-0.5">${dataObj.date}</div>
                    <div class="flex-1 flex items-center justify-center w-full">
                        <span class="text-[14px] sm:text-base md:text-lg lg:text-xl font-black tracking-tight leading-none">${dataObj.stem}${dataObj.branch}</span>
                    </div>
                `;

                cell.addEventListener('click', () => {
                    document.querySelectorAll('.active-day').forEach(a => a.classList.remove('active-day'));
                    cell.classList.add('active-day');
                    showDetails(dataObj);
                    
                    if (window.innerWidth < 1024) {
                        setTimeout(() => { document.getElementById('mobile-scroll-anchor').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
                    }
                });

                grid.appendChild(cell);
                
                // Автовыбор первого дня при загрузке месяца
                if (i === 0) cell.click(); 
            }
        }

        // Отрисовка деталей выбранного дня
        function showDetails(data) {
            const detailsPanel = document.getElementById('day-details');
            let badgeClass = '', statusText = '', iconSvg = '';

            switch(data.score) {
                case 5: badgeClass = 'bg-emerald-100 text-emerald-700'; statusText = 'Отличный день'; iconSvg = '<svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'; break;
                case 4: badgeClass = 'bg-yellow-100 text-yellow-700'; statusText = 'Благоприятно'; iconSvg = '<svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>'; break;
                case 3: badgeClass = 'bg-slate-200 text-slate-700'; statusText = 'Нейтральный день'; iconSvg = '<svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>'; break;
                case 2: badgeClass = 'bg-orange-100 text-orange-700'; statusText = 'Напряженный день'; iconSvg = '<svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>'; break;
                case 1: badgeClass = 'bg-rose-100 text-rose-700'; statusText = 'Критический день'; iconSvg = '<svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'; break;
            }

            detailsPanel.innerHTML = `
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 pb-5 border-b border-slate-200/60 gap-4">
                    <div class="flex items-baseline gap-2 md:gap-3">
                        <span class="text-4xl md:text-5xl font-black text-slate-800 tracking-tighter">${data.date}</span>
                        <span class="text-lg md:text-xl font-medium text-slate-500">${monthsConfig[currentMonthIndex].name.split(' ')[0].toLowerCase()}</span>
                    </div>
                    <div class="flex items-center self-start sm:self-auto gap-1.5 px-3 md:px-4 py-1.5 md:py-2 rounded-full text-[11px] md:text-xs font-bold uppercase tracking-wider ${badgeClass}">
                        ${iconSvg} ${statusText}
                    </div>
                </div>
                
                <div class="space-y-6 pb-8">
                    <div class="flex items-center gap-6 mb-4">
                        <div>
                            <h3 class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Столп Дня</h3>
                            <p class="text-3xl font-black text-slate-800 tracking-tight">${data.stem}${data.branch}</p>
                        </div>
                        <div class="h-10 w-px bg-slate-200"></div>
                        <div class="flex-1">
                            <h3 class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Энергии</h3>
                            <p class="text-sm font-semibold text-slate-700 leading-tight">${data.gods}</p>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100/50">
                        <h3 class="text-[11px] font-bold text-blue-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Влияние энергий
                        </h3>
                        <p class="text-slate-600 leading-relaxed text-[13px] md:text-sm">${data.general}</p>
                    </div>

                    <div class="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100/50">
                        <h3 class="text-[11px] font-bold text-emerald-600 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Рекомендации
                        </h3>
                        <p class="text-emerald-800 leading-relaxed text-[13px] md:text-sm">${data.recommend}</p>
                    </div>

                    <div class="bg-rose-50/50 p-5 rounded-2xl border border-rose-100/50">
                        <h3 class="text-[11px] font-bold text-rose-600 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            Зоны риска
                        </h3>
                        <p class="text-rose-800 leading-relaxed text-[13px] md:text-sm">${data.risks}</p>
                    </div>

                    <div class="bg-amber-50/50 p-5 rounded-2xl border border-amber-100/50">
                        <h3 class="text-[11px] font-bold text-amber-600 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Финансы & Бизнес
                        </h3>
                        <p class="text-amber-800 leading-relaxed text-[13px] md:text-sm">${data.finance}</p>
                    </div>

                    <div class="bg-fuchsia-50/50 p-5 rounded-2xl border border-fuchsia-100/50">
                        <h3 class="text-[11px] font-bold text-fuchsia-600 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                            Личная жизнь & Знакомства
                        </h3>
                        <p class="text-fuchsia-800 leading-relaxed text-[13px] md:text-sm">${data.romance}</p>
                    </div>
                </div>
            `;
        }

        // Запуск
        initCalendar();
    </script>
</body>
</html>
