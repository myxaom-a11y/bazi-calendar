                general: 'Много Земли и Металла. Мощный фокус на поиск выгоды и перфекционизм. Огонь затухает.',
                recommend: 'Занимайтесь оптимизацией процессов. Ищите способы сэкономить ресурсы без потери качества.',
                risks: 'Усталость от попыток проконтролировать каждую копейку и каждый пиксель.'
            },
            { 
                date: 28, stem: '壬', branch: '寅', score: 4, gods: 'Правильная Власть / Прямая Печать',
                general: 'Тигр (Дерево) активно подпитывает вас. Власть (структура) гармонично взаимодействует с Ресурсом (логикой).',
                recommend: 'Идеальный день для построения систем, настройки серверов, работы с официальными документами. Логика побеждает эмоции.',
                risks: 'Минимальны. Если следовать правилам, день пройдет очень успешно.'
            },
            { 
                date: 29, stem: '癸', branch: '卯', score: 3, gods: 'Седьмой Убийца / Косая Печать',
                general: 'Столкновение Кролика с проектами (Петух) на фоне жесткого давления Воды. Спасает только интуиция и нестандартный подход (Косая Печать).',
                recommend: 'Если проект упирается в стену — ищите лазейку. Не пытайтесь решить технические проблемы "в лоб".',
                risks: 'Стресс из-за срыва дедлайнов или технических неполадок.'
            },
            { 
                date: 30, stem: '甲', branch: '辰', score: 3, gods: 'Прямая Печать / Вызов Власти',
                general: 'Дракон сливается с Петухом (коммерция). Янское Дерево дает фундаментальные знания.',

                risks: 'Амбиции Дракона могут заставить вас пообещать клиентам больше, чем вы реально можете сделать.'

            { 
                date: 31, stem: '乙', branch: '巳', score: 4, gods: 'Косая Печать / Грабитель Богатства',

            }
        ];

        const calendarGrid = document.getElementById('calendar-grid');
        const detailsPanel = document.getElementById('day-details');

        // Пустые ячейки для начала месяца (Май 2026 начинается в Пятницу - 4 пустых дня: Пн, Вт, Ср, Чт)
        for (let i = 0; i < 4; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'p-2 rounded-lg bg-transparent';
            calendarGrid.appendChild(emptyCell);
        }

        let selectedElement = null;

        monthData.forEach(data => {
            const cell = document.createElement('div');
            cell.className = `p-2 md:p-3 rounded-lg border-2 cursor-pointer transition-all duration-200 score-${data.score} flex flex-col items-center justify-center min-h-[60px]`;
            
            cell.innerHTML = `
                <div class="text-sm font-bold opacity-70">${data.date}</div>
                <div class="text-lg font-black mt-1 leading-none">${data.stem}${data.branch}</div>
            `;

            cell.addEventListener('click', () => {
                if (selectedElement) {
                    selectedElement.classList.remove('active-day');
                }
                cell.classList.add('active-day');
                selectedElement = cell;
                showDetails(data);
            });

            calendarGrid.appendChild(cell);
        });

        function showDetails(data) {
            let badgeClass = '';
            let statusText = '';
            switch(data.score) {
                case 5: badgeClass = 'bg-green-100 text-green-800 border border-green-200'; statusText = 'Отличный день'; break;
                case 4: badgeClass = 'bg-yellow-100 text-yellow-800 border border-yellow-200'; statusText = 'Благоприятный день'; break;
                case 3: badgeClass = 'bg-slate-100 text-slate-800 border border-slate-200'; statusText = 'Нейтральный день'; break;
                case 2: badgeClass = 'bg-orange-100 text-orange-800 border border-orange-200'; statusText = 'Напряженный день'; break;
                case 1: badgeClass = 'bg-red-100 text-red-800 border border-red-200'; statusText = 'Критический день'; break;
            }

            detailsPanel.innerHTML = `
                <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200">
                    <div class="flex items-baseline gap-3">
                        <span class="text-4xl font-black text-slate-800">${data.date}</span>
                        <span class="text-xl font-medium text-slate-500">мая</span>
                    </div>
                    <span class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${badgeClass}">${statusText}</span>
                </div>
                
                <div class="space-y-6 pb-8">
                    <div class="flex items-center gap-6">
                        <div>
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Столп Дня</h3>
                            <p class="text-3xl font-bold text-slate-800">${data.stem}${data.branch}</p>
                        </div>
                        <div class="h-10 w-px bg-slate-200"></div>
                        <div>
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Энергии (Десять Божеств)</h3>
                            <p class="text-sm font-medium text-slate-700">${data.gods}</p>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                        <div class="flex items-center gap-2 mb-2">
                            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Общее влияние</h3>
                        </div>
                        <p class="text-slate-600 leading-relaxed text-sm">${data.general}</p>
                    </div>

                    <div class="bg-emerald-50 p-5 rounded-xl border border-emerald-100">
                        <div class="flex items-center gap-2 mb-2">
                            <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h3 class="text-sm font-bold text-emerald-800 uppercase tracking-wider">Рекомендации</h3>
                        </div>
                        <p class="text-emerald-700 leading-relaxed text-sm">${data.recommend}</p>
                    </div>

                    <div class="bg-red-50 p-5 rounded-xl border border-red-100">
                        <div class="flex items-center gap-2 mb-2">
                            <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            <h3 class="text-sm font-bold text-red-800 uppercase tracking-wider">Риски</h3>
                        </div>
                        <p class="text-red-700 leading-relaxed text-sm">${data.risks}</p>
                    </div>
                </div>
            `;

    </script>
